<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>מדדי מכירות</title>
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#f0f2f7;--white:#fff;--s2:#f7f8fc;--s3:#eef0f6;
  --border:#e2e6f0;--border2:#cbd1e2;
  --text:#1a1f2e;--t2:#5a6480;--t3:#9aa0b8;
  --blue:#2563eb;--blue-lt:#eff4ff;--blue-md:#bfcfff;
  --green:#059669;--green-lt:#ecfdf5;--green-md:#a7f3d0;
  --red:#dc2626;--red-lt:#fef2f2;--red-md:#fecaca;
  --amber:#d97706;--amber-lt:#fffbeb;--amber-md:#fde68a;
  --purple:#7c3aed;--purple-lt:#f5f3ff;--purple-md:#ddd6fe;
  --r:12px;--rsm:8px;
  --shadow:0 1px 3px rgba(0,0,0,.07),0 1px 2px rgba(0,0,0,.04);
  --shadow-md:0 4px 12px rgba(0,0,0,.08),0 2px 4px rgba(0,0,0,.05);
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Heebo',sans-serif;background:var(--bg);color:var(--text);direction:rtl;min-height:100vh;}
nav{position:sticky;top:0;z-index:300;background:var(--white);border-bottom:1px solid var(--border);box-shadow:var(--shadow);display:flex;align-items:center;justify-content:space-between;padding:0 32px;height:62px;}
.nav-brand{display:flex;align-items:center;gap:10px;}
.nav-icon{width:34px;height:34px;border-radius:9px;background:var(--blue);display:flex;align-items:center;justify-content:center;font-size:16px;box-shadow:0 2px 8px rgba(37,99,235,.35);}
.nav-title{font-size:17px;font-weight:800;letter-spacing:-.4px;}
.nav-sub{font-size:12px;color:var(--t3);margin-right:4px;font-weight:500;}
.nav-tabs{display:flex;gap:2px;background:var(--s3);border-radius:10px;padding:3px;}
.ntab{padding:7px 18px;border-radius:8px;font-size:13px;font-weight:700;cursor:pointer;border:none;background:transparent;color:var(--t2);font-family:'Heebo',sans-serif;transition:all .18s;}
.ntab.on{background:var(--white);color:var(--blue);box-shadow:var(--shadow);}
.ntab:hover:not(.on){background:rgba(255,255,255,.6);color:var(--text);}
.nav-date{font-size:12px;color:var(--t3);font-weight:500;}
.month-wrap{background:var(--white);border-bottom:1px solid var(--border);padding:12px 32px;}
.month-strip{display:flex;gap:6px;flex-wrap:wrap;}
.mbtn{padding:5px 14px;border-radius:20px;font-size:12px;font-weight:700;cursor:pointer;border:1.5px solid var(--border2);background:transparent;color:var(--t2);font-family:'Heebo',sans-serif;transition:all .15s;}
.mbtn.on{background:var(--blue);border-color:var(--blue);color:#fff;box-shadow:0 2px 8px rgba(37,99,235,.3);}
.mbtn:hover:not(.on){border-color:var(--blue);color:var(--blue);}
.main{padding:24px 32px;max-width:1600px;margin:0 auto;}
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:16px;}
.card{background:var(--white);border:1px solid var(--border);border-radius:var(--r);overflow:hidden;margin-bottom:20px;box-shadow:var(--shadow);}
.card-hdr{padding:16px 22px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px;}
.card-title{font-size:14px;font-weight:800;color:var(--text);}
.badge{font-size:11px;padding:4px 11px;border-radius:20px;font-weight:700;}
.bb{background:var(--blue-lt);color:var(--blue);border:1px solid var(--blue-md);}
.bg{background:var(--green-lt);color:var(--green);border:1px solid var(--green-md);}
.ba{background:var(--amber-lt);color:var(--amber);border:1px solid var(--amber-md);}
.bp{background:var(--purple-lt);color:var(--purple);border:1px solid var(--purple-md);}
.kpi-strip{display:grid;}
.kpi-cell{padding:20px 18px;text-align:center;border-left:1px solid var(--border);}
.kpi-cell:last-child{border-left:none;}
.kl{font-size:11px;color:var(--t3);font-weight:700;margin-bottom:8px;text-transform:uppercase;letter-spacing:.05em;line-height:1.4;}
.kv{font-size:26px;font-weight:900;line-height:1;letter-spacing:-.5px;}
.kv.blue{color:var(--blue);}.kv.green{color:var(--green);}.kv.red{color:var(--red);}.kv.amber{color:var(--amber);}.kv.purple{color:var(--purple);}
.ks{font-size:11px;color:var(--t3);margin-top:5px;font-weight:500;}
.form-body{padding:20px 22px;}
.rep-row{display:flex;gap:7px;flex-wrap:wrap;align-items:center;margin-bottom:18px;}
.rlbl{font-size:12px;color:var(--t2);font-weight:700;flex-shrink:0;}
.rbtn{padding:6px 15px;border-radius:20px;font-size:13px;font-weight:700;cursor:pointer;border:1.5px solid var(--border2);background:var(--s2);color:var(--t2);font-family:'Heebo',sans-serif;transition:all .13s;}
.rbtn.on{background:var(--blue);border-color:var(--blue);color:#fff;}
.rbtn:hover:not(.on){border-color:var(--blue);color:var(--blue);background:var(--blue-lt);}
.rbtn-add{border-style:dashed;color:var(--t3);background:transparent;}
.rbtn-add:hover{color:var(--blue);border-color:var(--blue);background:var(--blue-lt);}
.ig{display:flex;flex-direction:column;gap:6px;}
.ig label{font-size:11px;color:var(--t2);font-weight:700;text-transform:uppercase;letter-spacing:.05em;}
.ifield{background:var(--s2);border:1.5px solid var(--border);border-radius:var(--rsm);padding:10px 12px;font-size:14px;font-weight:700;color:var(--text);font-family:'Heebo',sans-serif;transition:all .15s;text-align:center;width:100%;}
.ifield:focus{outline:none;border-color:var(--blue);background:var(--white);box-shadow:0 0 0 3px rgba(37,99,235,.1);}
.ifield::placeholder{color:var(--t3);font-weight:400;font-size:13px;}
.ifield.date-f{text-align:right;font-size:13px;font-weight:600;}
.fields-grid{display:grid;grid-template-columns:repeat(10,1fr);gap:10px;margin-bottom:16px;}
.form-actions{display:flex;gap:10px;align-items:center;flex-wrap:wrap;}
.btn-pri{background:var(--blue);color:#fff;border:none;padding:11px 28px;border-radius:var(--rsm);font-size:14px;font-weight:800;cursor:pointer;font-family:'Heebo',sans-serif;transition:all .15s;box-shadow:0 2px 8px rgba(37,99,235,.3);}
.btn-pri:hover{background:#1d50c8;}.btn-pri:active{transform:scale(.98);}
.btn-sec{background:var(--s2);color:var(--t2);border:1.5px solid var(--border);padding:11px 18px;border-radius:var(--rsm);font-size:13px;font-weight:700;cursor:pointer;font-family:'Heebo',sans-serif;transition:all .15s;}
.btn-sec:hover{border-color:var(--border2);color:var(--text);background:var(--s3);}
.ok-msg{font-size:13px;color:var(--green);font-weight:700;opacity:0;transition:opacity .3s;}
.ok-msg.show{opacity:1;}
.tbl-wrap{overflow-x:auto;}
table{width:100%;border-collapse:collapse;}
thead th{padding:11px 14px;text-align:right;font-size:11px;font-weight:800;color:var(--t2);text-transform:uppercase;letter-spacing:.05em;background:var(--s2);border-bottom:2px solid var(--border);white-space:nowrap;}
thead th.c{text-align:center;}
thead th.grp-leads{border-bottom:2px solid var(--blue-md);color:var(--blue);}
thead th.grp-close{border-bottom:2px solid var(--green-md);color:var(--green);}
thead th.grp-conv{border-bottom:2px solid var(--amber-md);color:var(--amber);}
tbody tr{border-bottom:1px solid var(--border);transition:background .1s;}
tbody tr:last-child{border-bottom:none;}
tbody tr:hover{background:var(--s2);}
tbody tr.tot{background:#f0f4ff;border-top:2px solid var(--blue-md);}
tbody tr.tot:hover{background:#e8eeff;}
tbody td{padding:11px 14px;font-size:13px;color:var(--text);white-space:nowrap;}
td.c{text-align:center;}
td.rname{font-weight:800;font-size:14px;}
td.tot-name{font-weight:800;font-size:13px;color:var(--blue);}
.pill{display:inline-block;padding:3px 10px;border-radius:12px;font-size:12px;font-weight:800;}
.pg{background:var(--green-lt);color:var(--green);border:1px solid var(--green-md);}
.pa{background:var(--amber-lt);color:var(--amber);border:1px solid var(--amber-md);}
.pr{background:var(--red-lt);color:var(--red);border:1px solid var(--red-md);}
.pct-hi{color:var(--green);font-weight:800;}.pct-mid{color:var(--amber);font-weight:800;}.pct-lo{color:var(--red);font-weight:800;}
.del{background:transparent;border:1px solid transparent;color:var(--t3);cursor:pointer;font-size:12px;padding:4px 8px;border-radius:6px;transition:all .13s;font-family:'Heebo',sans-serif;}
.del:hover{color:var(--red);background:var(--red-lt);border-color:var(--red-md);}
.goals-grid{display:grid;grid-template-columns:160px repeat(4,1fr);border-top:1px solid var(--border);}
.gcell{padding:13px 16px;border-left:1px solid var(--border);border-bottom:1px solid var(--border);}
.gcell:nth-child(5n){border-left:none;}
.gcell.ghdr{background:var(--s2);font-size:11px;font-weight:800;color:var(--t2);text-transform:uppercase;letter-spacing:.05em;}
.gcell.grname{font-weight:800;font-size:14px;display:flex;align-items:center;}
.g-in{background:var(--s2);border:1.5px solid var(--border);border-radius:var(--rsm);padding:7px 10px;font-size:13px;font-weight:700;color:var(--text);font-family:'Heebo',sans-serif;width:100%;text-align:center;transition:all .15s;}
.g-in:focus{outline:none;border-color:var(--blue);background:var(--white);}
.g-status{font-size:12px;font-weight:800;margin-top:5px;}
.gs-hit{color:var(--green);}.gs-miss{color:var(--red);}.gs-none{color:var(--t3);}
.conv-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(230px,1fr));gap:14px;padding:20px 22px;}
.conv-card{background:var(--s2);border:1.5px solid var(--border);border-radius:var(--r);padding:16px;transition:box-shadow .15s,transform .15s;}
.conv-card:hover{box-shadow:var(--shadow-md);transform:translateY(-1px);}
.conv-rep-name{font-size:15px;font-weight:900;margin-bottom:12px;padding-bottom:10px;border-bottom:2px solid var(--border);}
.conv-row{display:flex;justify-content:space-between;align-items:center;padding:6px 0;border-bottom:1px solid var(--border);font-size:12px;}
.conv-row:last-child{border-bottom:none;}
.conv-lbl{color:var(--t2);font-weight:600;}.conv-val{font-weight:800;font-size:13px;}
.date-badge{display:inline-flex;flex-direction:column;align-items:center;padding:4px 8px;border-radius:7px;background:var(--blue-lt);border:1px solid var(--blue-md);}
.date-week{font-size:10px;font-weight:700;color:var(--blue);}.date-day{font-size:12px;font-weight:800;color:var(--text);}
.grp-hdr-row th{background:var(--s3);font-size:10px;font-weight:800;text-align:center;color:var(--t2);letter-spacing:.06em;padding:6px 8px;border-bottom:1px solid var(--border);}
.grp-hdr-row th.gh-leads{background:#eff4ff;color:var(--blue);}.grp-hdr-row th.gh-close{background:#ecfdf5;color:var(--green);}.grp-hdr-row th.gh-conv{background:#fffbeb;color:var(--amber);}
.dt-full{background:var(--green-lt);color:var(--green);border:1px solid var(--green-md);}
.dt-reserve{background:var(--amber-lt);color:var(--amber);border:1px solid var(--amber-md);}
.dt-complete{background:var(--blue-lt);color:var(--blue);border:1px solid var(--blue-md);}
.dt-cancel{background:var(--red-lt);color:var(--red);border:1px solid var(--red-md);}
.dt-other{background:#f3f4f6;color:#6b7280;border:1px solid #d1d5db;}
.deal-type-pill{display:inline-block;padding:3px 10px;border-radius:12px;font-size:11px;font-weight:700;}
.pay-chip{font-size:11px;color:var(--t2);background:var(--s3);border-radius:6px;padding:2px 7px;}
.rep-summary-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:12px;padding:20px 22px;}
.rep-sum-card{background:var(--s2);border:1.5px solid var(--border);border-radius:var(--r);padding:16px;}
.rep-sum-name{font-size:15px;font-weight:900;margin-bottom:12px;padding-bottom:8px;border-bottom:2px solid var(--border);}
.rep-sum-row{display:flex;justify-content:space-between;font-size:12px;padding:4px 0;border-bottom:1px solid var(--border);}
.rep-sum-row:last-child{border-bottom:none;}
.rep-sum-lbl{color:var(--t2);font-weight:600;}.rep-sum-val{font-weight:800;}
.filter-bar{display:flex;gap:8px;align-items:center;flex-wrap:wrap;}
.fsel{background:var(--s2);border:1.5px solid var(--border);color:var(--t2);padding:6px 12px;border-radius:var(--rsm);font-family:'Heebo',sans-serif;font-size:13px;font-weight:600;cursor:pointer;}
.fsel:focus{outline:none;border-color:var(--blue);}
.total-item{display:flex;flex-direction:column;gap:2px;}
.total-lbl{font-size:10px;font-weight:700;color:var(--t3);text-transform:uppercase;letter-spacing:.05em;}
.total-val{font-size:18px;font-weight:900;}
.empty-state{text-align:center;padding:48px 24px;color:var(--t3);font-size:14px;font-weight:500;}
.empty-state strong{display:block;font-size:18px;margin-bottom:6px;color:var(--t2);}
@media(max-width:1200px){.fields-grid{grid-template-columns:repeat(5,1fr);}.kpi-strip{grid-template-columns:repeat(5,1fr)!important;}}
@media(max-width:750px){.main{padding:14px 16px;}nav{padding:0 16px;}.month-wrap{padding:10px 16px;}.fields-grid{grid-template-columns:repeat(3,1fr);}.nav-date{display:none;}.two-col{grid-template-columns:1fr;}.goals-grid{grid-template-columns:130px repeat(2,1fr);}.conv-grid{grid-template-columns:1fr 1fr;}}
</style>
</head>

<script>







const SK = {months:'sm4_months', data:'sm4_data', reps:'sm4_reps', goals:'sm4_goals', sales:'sm4_sales5', bonuses:'sm4_bonuses'};
const DEFAULT_MONTHS = ['ינואר 26','פברואר 26','מרץ 26','אפריל 26','מאי 26','יוני 26','יולי 26','אוגוסט 26','ספטמבר 26','אוקטובר 26','נובמבר 26','דצמבר 26'];
const DEFAULT_REPS = ['ליאל','עמית','אבלין','לירן','אמיר בן נון','אמיר לוי'];

let months  = load(SK.months, DEFAULT_MONTHS);
let entries = load(SK.data, []);
let reps    = load(SK.reps, DEFAULT_REPS);
let goals   = load(SK.goals, {});
let salesLog = load(SK.sales, []);
let bonusLog = load(SK.bonuses, []);
let curMonth = months[0];
let curTab   = 'sales';
let curRep   = reps[0];

function load(k, d) { try { const v = localStorage.getItem(k); return v ? JSON.parse(v) : d; } catch(e) { return d; } }
function persist() {
  localStorage.setItem(SK.months, JSON.stringify(months));
  localStorage.setItem(SK.data,   JSON.stringify(entries));
  localStorage.setItem(SK.reps,   JSON.stringify(reps));
  localStorage.setItem(SK.goals,  JSON.stringify(goals));
  localStorage.setItem(SK.sales,  JSON.stringify(salesLog));
  localStorage.setItem(SK.bonuses, JSON.stringify(bonusLog));
  localStorage.setItem(SK.salaryConf, JSON.stringify(salaryConf));
}

window.onload = function() {
  document.getElementById('nav-date').textContent = new Date().toLocaleDateString('he-IL',{year:'numeric',month:'long',day:'numeric'});
  document.getElementById('f-date').value = today();
  buildMonthStrip(); buildRepRow(); renderAll();
};

function today() { return new Date().toISOString().split('T')[0]; }
function weekNum(ds) { const d = new Date(ds); return Math.min(Math.floor((d.getDate()-1)/7)+1, 5); }

function buildMonthStrip() {
  var h = '';
  months.forEach(function(m) {
    h += '<button class="mbtn' + (m===curMonth?' on':'') + '" onclick="pickMonth(\'' + m + '\')">' + m + '</button>';
  });
  document.getElementById('month-strip').innerHTML = h;
}
function pickMonth(m) { curMonth = m; buildMonthStrip(); renderAll(); }

function buildRepRow() {
  var h = '<span class="rlbl">בחר נציג:</span>';
  reps.forEach(function(r) {
    h += '<button class="rbtn' + (r===curRep?' on':'') + '" onclick="pickRep(\'' + r + '\')">' + r + '</button>';
  });
  h += '<button class="rbtn rbtn-add" onclick="addRep()">+ הוסף נציג</button>';
  var el = document.getElementById('rep-row');
  if (el) el.innerHTML = h;
}
function pickRep(r) { curRep = r; buildRepRow(); }
function addRep() {
  var n = prompt('שם הנציג החדש:');
  if (n && n.trim()) { reps.push(n.trim()); curRep = n.trim(); persist(); buildRepRow(); renderAll(); }
}

function setTab(t, btn) {
  curTab = t;
  document.querySelectorAll('.ntab').forEach(function(b) { b.classList.remove('on'); });
  btn.classList.add('on');
  var dc = document.getElementById('daily-input-card');
  if (dc) dc.style.display = (t === 'daily') ? '' : 'none';
  renderAll();
}

function saveEntry() {
  const date = document.getElementById('f-date').value;
  if (!date) { alert('בחר תאריך'); return; }
  entries.push({ id: Date.now(), month: curMonth, date, week: weekNum(date), rep: curRep,
    leads:  +document.getElementById('f-leads').value  || 0,
    rel:    +document.getElementById('f-rel').value    || 0,
    train:  +document.getElementById('f-train').value  || 0,
    data:   +document.getElementById('f-data').value   || 0,
    calls:  +document.getElementById('f-calls').value  || 0,
    full:   +document.getElementById('f-full').value   || 0,

function clearForm() {
  ['f-leads','f-rel','f-train','f-data','f-calls','f-full','f-air','f-close','f-rev','f-cancel']
    .forEach(id => { document.getElementById(id).value = ''; });
}
function delEntry(id) { entries = entries.filter(e => e.id !== id); persist(); renderAll(); }

// ── AGG ──────────────────────────────────────────────────────────────
const Z = {leads:0,rel:0,train:0,data:0,calls:0,full:0,air:0,close:0,rev:0,cancel:0};
function agg(arr) {
  return arr.reduce((a,e) => ({
    leads:a.leads+e.leads, rel:a.rel+e.rel, train:a.train+e.train,
    data:a.data+e.data, calls:a.calls+e.calls, full:a.full+e.full,
    air:a.air+e.air, close:a.close+e.close, rev:a.rev+e.rev, cancel:a.cancel+e.cancel,
  }), {...Z});
}
function pct(n,d)  { return d>0 ? Math.round(n/d*100) : 0; }
function pctS(n,d) { return d>0 ? Math.round(n/d*100)+'%' : '—'; }
function avgDeal(a){ return a.close>0 ? Math.round(a.rev/a.close) : 0; }
function allLeads(a){ return a.leads+a.train+a.data; }
function cc(v)     { return v>=30?'pct-hi':v>=15?'pct-mid':'pct-lo'; }
function pc(c)     { return c>=3?'pg':c>=1?'pa':'pr'; }
function fmt(n)    { return (+n||0).toLocaleString('he-IL'); }
function renderAll(){
  if(curTab==='sales'){renderSales();return;}
  if(curTab==='bonuses'){renderBonuses();return;}
  if(curTab==='salary'){renderSalary();return;}
  var mdR=entries.filter(function(e){return e.month===curMonth;});
  if(curTab==='daily')renderDaily(mdR);
  else if(curTab==='weekly')renderWeekly(mdR);
  else if(curTab==='monthly')renderMonthly(mdR);
  else renderConv(mdR);
}

// ── CONV ──────────────────────────────────────────────────────────────
function renderConv(md) {
  const ta = agg(md);
  const overall = [
    {l:'המרה משיחות מלאות',  v:pctS(ta.close,ta.full),       c:cc(pct(ta.close,ta.full))},
    {l:'המרה מלידים ישירים', v:pctS(ta.close,ta.leads),      c:cc(pct(ta.close,ta.leads))},
    {l:'המרה מרלוונטים',     v:pctS(ta.close,ta.rel),        c:cc(pct(ta.close,ta.rel))},
    {l:'המרה מכלל הלידים',  v:pctS(ta.close,allLeads(ta)),   c:cc(pct(ta.close,allLeads(ta)))},
    {l:'% רלוונטים מלידים',  v:pctS(ta.rel,ta.leads),        c:cc(pct(ta.rel,ta.leads))},
    {l:'מחיר ממוצע לעסקה',  v:fmt(avgDeal(ta))+'₪',         c:''},
  ];

  const cards = reps.map(rep => {
    const re = md.filter(e => e.rep===rep);
    if (!re.length) return `<div class="conv-card"><div class="conv-rep-name">${rep}</div><div style="color:var(--t3);font-size:13px;padding:12px 0">אין נתונים לחודש זה</div></div>`;
    const a = agg(re);
    const rows = [
      {l:'המרה משיחות מלאות',  v:pctS(a.close,a.full),      c:cc(pct(a.close,a.full))},
      {l:'המרה מלידים ישירים', v:pctS(a.close,a.leads),     c:cc(pct(a.close,a.leads))},
      {l:'המרה מרלוונטים',     v:pctS(a.close,a.rel),       c:cc(pct(a.close,a.rel))},
      {l:'המרה מכלל הלידים',  v:pctS(a.close,allLeads(a)),  c:cc(pct(a.close,allLeads(a)))},
      {l:'% רלוונטים מלידים',  v:pctS(a.rel,a.leads),       c:cc(pct(a.rel,a.leads))},
      {l:'מחיר ממוצע לעסקה',  v:fmt(avgDeal(a))+'₪',        c:''},
      {l:'סגירות',             v:a.close,                    c:''},
      {l:'מחזור ₪',            v:fmt(a.rev),                 c:''},
    ];
    return `<div class="conv-card">
      <div class="conv-rep-name">${rep}</div>
      ${rows.map(r=>`<div class="conv-row">
        <span class="conv-lbl">${r.l}</span>
        <span class="conv-val ${r.c}">${r.v}</span>
      </div>`).join('')}
    </div>`;
  }).join('');

  document.getElementById('view').innerHTML = `
    <div class="card">
      <div class="kpi-strip" style="grid-template-columns:repeat(6,1fr);border-bottom:1px solid var(--border)">

        <span class="badge bp">חישוב אוטומטי</span>

    </div>`;
}

const PRODUCTS    = ['ליווי אישי פרימיום','ליווי עסקי','קורס + פגישה','רק קורס'];

const PAY_METHODS = ['כרטיס אשראי','פיימנט בקליק','העברה בנקאית','פיימנט תפעול','ביט','הוק אשראי','אחר'];
const TIZRAMI     = ['כרטיס אשראי','פיימנט בקליק','העברה בנקאית'];
const BONUS_TYPES = ['מכירה בשישי','מכירה מתגלגלת','שעתיים זהב','שעתיים זהב בוקר','סקאנד וויס','תחרות ריצה','בונוס אישי','אחר'];

// ── WORK DAYS ──────────────────────────────────────────────────────────
function workDaysInMonth(ms) {
  const HE={'ינואר':0,'פברואר':1,'מרץ':2,'אפריל':3,'מאי':4,'יוני':5,'יולי':6,'אוגוסט':7,'ספטמבר':8,'אוקטובר':9,'נובמבר':10,'דצמבר':11};
  const p=ms.split(' '), m=HE[p[0]], y=p[1]?2000+parseInt(p[1]):new Date().getFullYear();
  if(m===undefined)return 22;
  let c=0; for(let d=1;d<=new Date(y,m+1,0).getDate();d++){const dw=new Date(y,m,d).getDay();if(dw!==5&&dw!==6)c++;}
  return c;
}
function workDaysPassed(ms) {
  const HE={'ינואר':0,'פברואר':1,'מרץ':2,'אפריל':3,'מאי':4,'יוני':5,'יולי':6,'אוגוסט':7,'ספטמבר':8,'אוקטובר':9,'נובמבר':10,'דצמבר':11};
  const p=ms.split(' '), m=HE[p[0]], y=p[1]?2000+parseInt(p[1]):new Date().getFullYear();
  if(m===undefined)return 0;
  const now=new Date(),cy=now.getFullYear(),cm=now.getMonth();
  if(y>cy||(y===cy&&m>cm))return 0;
  const end=(y===cy&&m===cm)?now.getDate():new Date(y,m+1,0).getDate();
  let c=0; for(let d=1;d<=end;d++){const dw=new Date(y,m,d).getDay();if(dw!==5&&dw!==6)c++;}
  return c;
}

  const filtered     = allMonth.filter(function(s){return (!filterRep||s.seller===filterRep)&&(!filterType||s.dealType===filterType);});

  const totalWD=workDaysInMonth(curMonth), passedWD=workDaysPassed(curMonth), remainWD=totalWD-passedWD;
  const totalDeals=notCancelled.length;
  const totalRev=notCancelled.reduce(function(a,s){return a+(+s.amount||0);},0);

  const gk=curMonth+'|SALES', sg=goals[gk]||{};

  const revLeft=goalRev?Math.max(0,goalRev-totalRev):null;
  const dealsPct=goalDeals?Math.round(totalDeals/goalDeals*100):null;
  const revPct=goalRev?Math.round(totalRev/goalRev*100):null;

function toggleCancel() {
  const w=document.getElementById('cancel-wrap');
  const dt=document.getElementById('s-dtype');
  if(w&&dt) w.style.display=dt.value==='ביטול'?'':'none';
}

function saveSale(){
  var d=document.getElementById('s-date').value;
  var cl=document.getElementById('s-client').value.trim();
  if(!d||!cl){alert('תאריך ושם לקוח הם שדות חובה');return;}
  var dtype=document.getElementById('s-dtype').value;
  salesLog.push({id:Date.now(),month:curMonth,date:d,client:cl,
    phone:document.getElementById('s-phone').value.trim(),
    seller:document.getElementById('s-seller').value,
    product:document.getElementById('s-product').value,
    payMethod:document.getElementById('s-pay').value,
    dealType:dtype,
    amount:+document.getElementById('s-amount').value||0,
    completionDate:document.getElementById('s-completion').value,
    cancelReason:dtype==='ביטול'?document.getElementById('s-cancel').value.trim():'',
    notes:document.getElementById('s-notes').value.trim(),
  });
  persist();
  ['s-client','s-phone','s-amount','s-notes','s-cancel','s-completion'].forEach(function(id){var el=document.getElementById(id);if(el)el.value='';});
  var ok=document.getElementById('sale-ok');
  if(ok){ok.classList.add('show');setTimeout(function(){ok.classList.remove('show');},2500);}
  renderAll();
}

function delSale(id){salesLog=salesLog.filter(function(s){return s.id!==id;});persist();renderAll();}

function renderBonuses() {
  const allB=bonusLog.filter(function(b){return b.month===curMonth;});
  const totalBonus=allB.reduce(function(a,b){return a+(+b.bonusAmount||0);},0);

  var repCardsHtml='';
  reps.forEach(function(rep){
    const rb=allB.filter(function(b){return b.rep===rep;});
    if(!rb.length){repCardsHtml+='<div class="rep-sum-card"><div class="rep-sum-name">'+rep+'</div><div style="color:var(--t3);font-size:12px;padding:8px 0">אין בונוסים</div></div>';return;}
    const rt=rb.reduce(function(a,b){return a+(+b.bonusAmount||0);},0);
    repCardsHtml+='<div class="rep-sum-card"><div class="rep-sum-name">'+rep+'</div>'+
      '<div class="rep-sum-row"><span class="rep-sum-lbl">בונוסים</span><span class="rep-sum-val">'+rb.length+'</span></div>'+
      '<div class="rep-sum-row"><span class="rep-sum-lbl">סה״כ</span><span class="rep-sum-val" style="color:var(--green)">'+fmt(rt)+'₪</span></div></div>';
  });

  var byType={};
  allB.forEach(function(b){if(!byType[b.bonusType])byType[b.bonusType]={count:0,total:0};byType[b.bonusType].count++;byType[b.bonusType].total+=(+b.bonusAmount||0);});
  var typeRowsHtml='';
  Object.keys(byType).forEach(function(t){
    typeRowsHtml+='<div style="display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid var(--border);font-size:13px">'+
      '<span style="font-weight:700">'+t+'</span><div style="display:flex;gap:16px">'+
      '<span style="color:var(--t2)">'+byType[t].count+' בונוסים</span>'+
      '<span style="font-weight:800;color:var(--green)">'+fmt(byType[t].total)+'₪</span></div></div>';
  });

  var tableRows='';
  if(allB.length){
    var rev=[].concat(allB).reverse();
    rev.forEach(function(b){
      tableRows+='<tr>'+
        '<td style="font-size:12px;color:var(--t2)">'+(b.date||'')+'</td>'+
        '<td class="rname">'+(b.rep||'')+'</td>'+
        '<td style="font-size:12px">'+(b.bonusType||'')+'</td>'+
        '<td style="font-size:12px;color:var(--t2)">'+(b.product||'')+'</td>'+
        '<td class="c" style="font-weight:700">'+(b.dealAmount?fmt(b.dealAmount)+'₪':'')+'</td>'+
        '<td class="c" style="font-weight:800;color:var(--green)">'+(b.bonusAmount?fmt(b.bonusAmount)+'₪':'')+'</td>'+
        '<td><button class="del" onclick="delBonus('+b.id+')">מחק</button></td></tr>';
    });
  } else {
    tableRows='<tr><td colspan="7"><div class="empty-state"><strong>אין בונוסים</strong>הזן בונוסים בטופס למטה</div></td></tr>';
  }

  var repOpts='',typeOpts='',prodOpts='';
  reps.forEach(function(r){repOpts+='<option value="'+r+'">'+r+'</option>';});
  BONUS_TYPES.forEach(function(t){typeOpts+='<option value="'+t+'">'+t+'</option>';});
  PRODUCTS.forEach(function(p){prodOpts+='<option value="'+p+'">'+p+'</option>';});

  document.getElementById('view').innerHTML =
    '<div style="display:grid;grid-template-columns:1fr 1fr;gap:16px">'+
    '<div class="card"><div class="card-hdr"><span class="card-title">סיכום לפי נציג</span><span class="badge bg">סה״כ: '+fmt(totalBonus)+'₪</span></div>'+
      '<div class="rep-summary-grid">'+repCardsHtml+'</div></div>'+
    '<div class="card"><div class="card-hdr"><span class="card-title">בונוסים לפי סוג תחרות</span></div>'+
      '<div style="padding:16px 20px">'+(typeRowsHtml||'<div class="empty-state">אין נתונים</div>')+'</div></div>'+
    '</div>'+

    '<div class="card"><div class="card-hdr"><span class="card-title">רשימת בונוסים — '+curMonth+'</span><span class="badge bg">סה״כ: '+fmt(totalBonus)+'₪</span></div>'+
      '<div class="tbl-wrap"><table>'+
        '<thead><tr><th>תאריך</th><th>נציג</th><th>סוג תחרות</th><th>תוכנית</th>'+
        '<th class="c">סכום עסקה ₪</th><th class="c">בונוס ₪</th><th></th></tr></thead>'+
        '<tbody>'+tableRows+'</tbody></table></div></div>'+

    '<div class="card"><div class="card-hdr"><span class="card-title">הזנת בונוס חדש</span><span class="badge bp">הזנה ידנית</span></div>'+
      '<div class="form-body">'+
        '<div style="display:grid;grid-template-columns:130px 160px 200px 180px 130px 130px;gap:10px;margin-bottom:14px">'+
          '<div class="ig"><label>תאריך</label><input type="date" id="b-date" class="ifield date-f" value="'+today()+'"></div>'+
          '<div class="ig"><label>נציג</label><select id="b-rep" class="ifield fsel">'+repOpts+'</select></div>'+
          '<div class="ig"><label>סוג תחרות</label><select id="b-type" class="ifield fsel">'+typeOpts+'</select></div>'+
          '<div class="ig"><label>תוכנית</label><select id="b-product" class="ifield fsel">'+prodOpts+'</select></div>'+
          '<div class="ig"><label>סכום עסקה ₪</label><input type="number" id="b-deal" class="ifield" placeholder="0" min="0"></div>'+
          '<div class="ig"><label>סכום בונוס ₪</label><input type="number" id="b-bonus" class="ifield" placeholder="0" min="0"></div>'+
        '</div>'+
        '<div class="form-actions">'+
          '<button class="btn-pri" onclick="saveBonus()">הוסף בונוס ✓</button>'+
          '<span class="ok-msg" id="bonus-ok">✓ בונוס נשמר!</span>'+
        '</div>'+
      '</div></div>';
}

function saveBonus(){
  const d=document.getElementById('b-date').value;
  if(!d){alert('בחר תאריך');return;}
  bonusLog.push({id:Date.now(),month:curMonth,date:d,
    rep:document.getElementById('b-rep').value,
    bonusType:document.getElementById('b-type').value,
    product:document.getElementById('b-product').value,
    dealAmount:+document.getElementById('b-deal').value||0,
    bonusAmount:+document.getElementById('b-bonus').value||0,
  });
  persist();
  ['b-deal','b-bonus'].forEach(function(id){document.getElementById(id).value='';});
  var ok=document.getElementById('bonus-ok');
  if(ok){ok.classList.add('show');setTimeout(function(){ok.classList.remove('show');},2500);}
  renderAll();
}

function delBonus(id){bonusLog=bonusLog.filter(function(b){return b.id!==id;});persist();renderAll();}

function saveGoal(gk,field,val){if(!goals[gk])goals[gk]={};goals[gk][field]=+val||0;persist();renderAll();}

// ─── SALARY ───────────────────────────────────────────────────────────
var TIERS = [
  {label:'\u05de\u05d3\u05e8\u05d2\u05d4 1', min:0,      max:50000,   pct:0.10, ptor:4237,  morsha:5000},
  {label:'\u05de\u05d3\u05e8\u05d2\u05d4 2', min:50001,  max:70000,   pct:0.11, ptor:6525,  morsha:7700},
  {label:'\u05de\u05d3\u05e8\u05d2\u05d4 3', min:70001,  max:90000,   pct:0.12, ptor:9152,  morsha:10800},
  {label:'\u05de\u05d3\u05e8\u05d2\u05d4 4', min:90001,  max:120000,  pct:0.13, ptor:13220, morsha:15600},
  {label:'\u05de\u05d3\u05e8\u05d2\u05d4 5', min:120001, max:150000,  pct:0.14, ptor:17796, morsha:21000},
  {label:'\u05de\u05d3\u05e8\u05d2\u05d4 6', min:150001, max:Infinity, pct:0.15, ptor:19067, morsha:22500}
];
var VAT_RATE = 1.18;

function getTier(rev) {
  for(var i=0;i<TIERS.length;i++){if(rev>=TIERS[i].min&&rev<=TIERS[i].max)return TIERS[i];}
  return TIERS[TIERS.length-1];
}

function setSalaryVat(ck, val) {
  if(!salaryConf[ck])salaryConf[ck]={};
  salaryConf[ck].vat=val;
  persist();renderSalary();
}

function setSalaryRev(ck, val) {
  if(!salaryConf[ck])salaryConf[ck]={};
  salaryConf[ck].rev=+val||0;
  persist();renderSalary();
}

function renderSalary() {
  var sales   = salesLog.filter(function(s){return s.month===curMonth&&s.dealType!=='\u05d1\u05d9\u05d8\u05d5\u05dc';});
  var bonuses = bonusLog.filter(function(b){return b.month===curMonth;});
  var grandTotal=0, cards='', trows='';

  reps.forEach(function(rep){
    var ck   = curMonth+'__'+rep;
    var conf = salaryConf[ck]||{};
    var isPtor = conf.vat==='ptor';

    // Get revenue: manual override > sales log > daily entries
    var rev = 0;
    var repSales = sales.filter(function(s){return s.seller===rep;});
    rev = repSales.reduce(function(a,s){return a+(+s.amount||0);},0);
    if(!rev){
      rev = entries.filter(function(e){return e.month===curMonth&&e.rep===rep;})
                   .reduce(function(a,e){return a+(+e.rev||0);},0);
    }
    if(conf.rev&&conf.rev>0) rev = conf.rev;

    var tier       = getTier(rev);
    var base       = isPtor ? Math.round(rev/VAT_RATE) : rev;
    var commission = Math.round(base*tier.pct);
    var repBonus   = bonuses.filter(function(b){return b.rep===rep;})
                            .reduce(function(a,b){return a+(+b.bonusAmount||0);},0);
    var total      = commission+repBonus;
    grandTotal    += total;

    var tcolors  = ['#059669','#2563eb','#7c3aed','#d97706','#dc2626','#374151'];
    var tcol     = tcolors[TIERS.indexOf(tier)]||'#2563eb';
    var capSal   = isPtor?tier.ptor:tier.morsha;

    // safe ck for data attribute (no special chars issues)
    var safeCk = ck;

    cards += '<div style="background:#fff;border:1.5px solid #e2e6f0;border-radius:12px;overflow:hidden;box-shadow:0 1px 3px rgba(0,0,0,.07)">';
    cards += '<div style="background:'+tcol+';padding:14px 18px;display:flex;justify-content:space-between;align-items:center">';
    cards += '<div style="color:#fff;font-size:16px;font-weight:900">'+rep+'</div>';
    cards += '<div style="background:rgba(255,255,255,.2);color:#fff;padding:3px 10px;border-radius:20px;font-size:12px;font-weight:700">'+tier.label+' \u2022 '+(tier.pct*100)+'%</div>';
    cards += '</div>';
    cards += '<div style="padding:16px 18px">';

    // Vat type buttons
    cards += '<div style="display:flex;gap:8px;margin-bottom:14px;align-items:center">';
    cards += '<span style="font-size:12px;color:#5a6480;font-weight:600">\u05e1\u05d5\u05d2 \u05e2\u05d5\u05e1\u05e7:</span>';

    var morStyle = isPtor
      ? 'background:transparent;color:#9aa0b8;border:1.5px solid #e2e6f0'
      : 'background:#eff4ff;color:#2563eb;border:1.5px solid #bfcfff';
    var ptorStyle = isPtor
      ? 'background:#ecfdf5;color:#059669;border:1.5px solid #a7f3d0'
      : 'background:transparent;color:#9aa0b8;border:1.5px solid #e2e6f0';

    cards += '<button data-ck="'+safeCk+'" data-v="morsha" onclick="setSalaryVat(this.dataset.ck,this.dataset.v)" style="padding:5px 12px;border-radius:16px;font-size:12px;font-weight:700;cursor:pointer;font-family:Heebo,sans-serif;'+morStyle+'">\u05e2\u05d5\u05e1\u05e7 \u05de\u05d5\u05e8\u05e9\u05d4</button>';
    cards += '<button data-ck="'+safeCk+'" data-v="ptor" onclick="setSalaryVat(this.dataset.ck,this.dataset.v)" style="padding:5px 12px;border-radius:16px;font-size:12px;font-weight:700;cursor:pointer;font-family:Heebo,sans-serif;'+ptorStyle+'">\u05e2\u05d5\u05e1\u05e7 \u05e4\u05d8\u05d5\u05e8</button>';
    cards += '</div>';

    // Revenue input
    cards += '<div style="margin-bottom:14px">';
    cards += '<div style="font-size:11px;color:#9aa0b8;font-weight:700;text-transform:uppercase;letter-spacing:.05em;margin-bottom:5px">\u05de\u05d7\u05d6\u05d5\u05e8 '+(isPtor?'(\u05db\u05d5\u05dc\u05dc \u05de\u05e2\u05de)':'(\u05e0\u05d8\u05d5)')+'</div>';
    cards += '<div style="display:flex;gap:8px;align-items:center">';
    cards += '<input type="number" value="'+(conf.rev||rev||'')+'" placeholder="\u05d4\u05d6\u05df \u05de\u05d7\u05d6\u05d5\u05e8 \u05d9\u05d3\u05e0\u05d9\u05ea..." data-ck="'+safeCk+'" onchange="setSalaryRev(this.dataset.ck,this.value)" style="flex:1;background:#f7f8fc;border:1.5px solid #e2e6f0;border-radius:8px;padding:9px 12px;font-size:14px;font-weight:700;color:#1a1f2e;font-family:Heebo,sans-serif;text-align:center">';
    cards += '<span style="font-size:12px;color:#9aa0b8;white-space:nowrap">\u20aa '+fmt(rev)+'</span>';
    cards += '</div>';
    if(isPtor) cards += '<div style="font-size:11px;color:#9aa0b8;margin-top:4px">\u05d1\u05e1\u05d9\u05e1 \u05d7\u05d9\u05e9\u05d5\u05d1 (\u05e0\u05d8\u05d5): \u20aa '+fmt(base)+'</div>';
    cards += '</div>';

    // Breakdown
    cards += '<div style="background:#f7f8fc;border-radius:8px;padding:12px 14px;margin-bottom:12px">';
    cards += '<div style="display:flex;justify-content:space-between;padding:5px 0;border-bottom:1px solid #e2e6f0;font-size:13px"><span style="color:#5a6480;font-weight:600">\u05de\u05d7\u05d6\u05d5\u05e8 \u05d1\u05e1\u05d9\u05e1</span><span style="font-weight:800">'+fmt(base)+' \u20aa</span></div>';
    cards += '<div style="display:flex;justify-content:space-between;padding:5px 0;border-bottom:1px solid #e2e6f0;font-size:13px"><span style="color:#5a6480;font-weight:600">\u05d0\u05d7\u05d5\u05d6 \u05e2\u05de\u05dc\u05d4</span><span style="font-weight:800;color:'+tcol+'">'+(tier.pct*100)+'%</span></div>';
    cards += '<div style="display:flex;justify-content:space-between;padding:5px 0;border-bottom:1px solid #e2e6f0;font-size:13px"><span style="color:#5a6480;font-weight:600">\u05e2\u05de\u05dc\u05d4</span><span style="font-weight:800">'+fmt(commission)+' \u20aa</span></div>';
    cards += '<div style="display:flex;justify-content:space-between;padding:5px 0;border-bottom:1px solid #e2e6f0;font-size:13px"><span style="color:#059669;font-weight:700">\u05d1\u05d5\u05e0\u05d5\u05e1\u05d9\u05dd</span><span style="font-weight:800;color:#059669">'+fmt(repBonus)+' \u20aa</span></div>';
    cards += '<div style="display:flex;justify-content:space-between;padding:8px 0 4px;font-size:15px"><span style="font-weight:800">\u05e1\u05d4\u05f4\u05db \u05de\u05e9\u05db\u05d5\u05e8\u05ea</span><span style="font-weight:900;font-size:18px;color:'+tcol+'">'+fmt(total)+' \u20aa</span></div>';
    cards += '</div>';
    cards += '<div style="font-size:11px;color:#9aa0b8;text-align:center">\u05ea\u05e7\u05e8\u05ea \u05de\u05d3\u05e8\u05d2\u05d4: '+fmt(capSal)+' \u20aa</div>';
    cards += '</div></div>';

    trows += '<tr>';
    trows += '<td class="rname">'+rep+'</td>';
    trows += '<td class="c">'+(isPtor?'\u05e2\u05d5\u05e1\u05e7 \u05e4\u05d8\u05d5\u05e8':'\u05e2\u05d5\u05e1\u05e7 \u05de\u05d5\u05e8\u05e9\u05d4')+'</td>';
    trows += '<td class="c" style="font-weight:700">'+fmt(rev)+'</td>';
    trows += '<td class="c">'+(isPtor?fmt(base):'\u2014')+'</td>';
    trows += '<td class="c" style="color:#2563eb;font-weight:800">'+(tier.pct*100)+'% ('+tier.label+')</td>';
    trows += '<td class="c" style="font-weight:700">'+fmt(commission)+'</td>';
    trows += '<td class="c" style="color:#059669;font-weight:700">'+fmt(repBonus)+'</td>';
    trows += '<td class="c" style="font-weight:900;font-size:14px;color:#2563eb">'+fmt(total)+' \u20aa</td>';
    trows += '</tr>';
  });

  // Tier reference table
  var tierRows='';
  TIERS.forEach(function(t){
    tierRows += '<tr>';
    tierRows += '<td class="c" style="font-weight:700">'+t.label+'</td>';
    tierRows += '<td class="c">'+fmt(t.min)+' \u2013 '+(t.max===Infinity?'+\u221e':fmt(t.max))+'</td>';
    tierRows += '<td class="c" style="font-weight:800;color:#2563eb">'+(t.pct*100)+'%</td>';
    tierRows += '<td class="c">'+fmt(t.ptor)+' \u20aa</td>';
    tierRows += '<td class="c">'+fmt(t.morsha)+' \u20aa</td>';
    tierRows += '</tr>';
  });

  var totalSalesRev  = sales.reduce(function(a,s){return a+(+s.amount||0);},0);
  var totalBonusAll  = bonuses.reduce(function(a,b){return a+(+b.bonusAmount||0);},0);

  var html = '';

  // KPI strip

  html += '<div class="kpi-cell"><div class="kl">\u05e2\u05e1\u05e7\u05d0\u05d5\u05ea</div><div class="kv blue">'+sales.length+'</div><div class="ks">'+curMonth+'</div></div>';
  html += '<div class="kpi-cell"><div class="kl">\u05de\u05d7\u05d6\u05d5\u05e8 \u05de\u05d5\u05e7\u05d3</div><div class="kv green">'+fmt(totalSalesRev)+'</div><div class="ks">\u20aa</div></div>';

  html += '<th>\u05e0\u05e6\u05d9\u05d2</th><th class="c">\u05e1\u05d5\u05d2 \u05e2\u05d5\u05e1\u05e7</th><th class="c">\u05de\u05d7\u05d6\u05d5\u05e8 \u20aa</th>';

  html += '<th class="c">\u05e2\u05de\u05dc\u05d4 \u20aa</th><th class="c">\u05d1\u05d5\u05e0\u05d5\u05e1\u05d9\u05dd \u20aa</th><th class="c">\u05e1\u05d4\u05f4\u05db \u05de\u05e9\u05db\u05d5\u05e8\u05ea</th>';
  html += '</tr></thead><tbody>'+trows+'</tbody></table></div></div>';

  // Tier reference
  html += '<div class="card">';
  html += '<div class="card-hdr"><span class="card-title">\u05d0\u05d9\u05e0\u05d3\u05e7\u05e1 \u05ea\u05d2\u05de\u05d5\u05dc \u2014 \u05de\u05d3\u05e8\u05d2\u05d5\u05ea</span><span class="badge ba">* \u05dc\u05d0 \u05db\u05d5\u05dc\u05dc \u05d1\u05d5\u05e0\u05d5\u05e1\u05d9\u05dd, \u05de\u05d5\u05e7\u05d3\u05d9\u05d9\u05dd \u05d5\u05ea\u05d7\u05e8\u05d5\u05d9\u05d5\u05ea</span></div>';
  html += '<div class="tbl-wrap"><table><thead><tr>';
  html += '<th class="c">\u05de\u05d3\u05e8\u05d2\u05d4</th><th class="c">\u05de\u05d7\u05d6\u05d5\u05e8 \u05de\u05db\u05d9\u05e8\u05d5\u05ea</th><th class="c">\u05d0\u05d7\u05d5\u05d6\u05d9\u05dd</th>';
  html += '<th class="c">\u05de\u05e9\u05db\u05d5\u05e8\u05ea \u05e4\u05d8\u05d5\u05e8</th><th class="c">\u05de\u05e9\u05db\u05d5\u05e8\u05ea \u05de\u05d5\u05e8\u05e9\u05d4</th>';
  html += '</tr></thead><tbody>'+tierRows+'</tbody></table></div>';
  html += '<div style="background:#fef2f2;border:1px solid #fecaca;margin:0 20px 16px;border-radius:8px;padding:10px 14px;color:#dc2626;font-size:12px;font-weight:700;text-align:center">* \u05dc\u05d0 \u05db\u05d5\u05dc\u05dc \u05d1\u05d5\u05e0\u05d5\u05e1\u05d9\u05dd, \u05de\u05d5\u05e7\u05d3\u05d9\u05d9\u05dd \u05d5\u05ea\u05d7\u05e8\u05d5\u05d9\u05d5\u05ea</div>';
  html += '</div>';

  document.getElementById('view').innerHTML = html;
}
